<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters Modesto Tournament Bracket</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #C8102E;
            --red-dark: #9B0B22;
            --blue: #003DA5;
            --blue-dark: #002880;
            --white: #FFFFFF;
            --off-white: #F5F5F7;
            --grey: #E8E8E8;
            --text: #1A1A2E;
            --gold: #F7C948;
            --line: rgba(0, 61, 165, 0.22);
            --shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
        }

        [data-theme="dark"] {
            --red: #E8234A;
            --red-dark: #C8102E;
            --blue: #5B8FE8;
            --blue-dark: #3D6FCC;
            --white: #1E1E2E;
            --off-white: #13131F;
            --grey: #2E2E48;
            --text: #E2E2F0;
            --gold: #FFD466;
            --line: rgba(91, 143, 232, 0.32);
            --shadow: 0 14px 40px rgba(0, 0, 0, 0.38);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(200, 16, 46, 0.10), transparent 30%),
                radial-gradient(circle at top right, rgba(0, 61, 165, 0.14), transparent 35%),
                var(--off-white);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 52%, var(--red) 100%);
            padding: 2rem 1rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 20px,
                    rgba(255, 255, 255, 0.03) 20px,
                    rgba(255, 255, 255, 0.03) 40px
                );
        }

        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-1px);
        }

        .league-switch { margin-top: 0.9rem; display: flex; gap: 0.6rem; align-items: center; justify-content: center; animation: slideUp 0.6s ease 0.62s both; }
        .league-switch label { color: rgba(255,255,255,0.88); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; }
        .league-switch select {
            min-width: 240px; max-width: 92vw; background: rgba(255,255,255,0.15); color: var(--white);
            border: 1px solid rgba(255,255,255,0.42); border-radius: 999px; padding: 0.5rem 0.9rem;
            font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 800; cursor: pointer;
        }
        .league-switch select option { color: #1A1A2E; background: #FFFFFF; }

        .header-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
            animation: floatIn 0.8s ease both;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.8rem);
            color: var(--white);
            letter-spacing: 0.05em;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease 0.2s both;
        }

        .season-badge {
            display: inline-block;
            background: var(--red);
            color: var(--white);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            padding: 0.3rem 1.2rem;
            border-radius: 2rem;
            text-transform: uppercase;
            animation: slideUp 0.6s ease 0.35s both;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
            animation: slideUp 0.6s ease 0.5s both;
        }

        .stat {
            text-align: center;
            color: rgba(255, 255, 255, 0.86);
        }

        .stat-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            line-height: 1;
            color: var(--white);
        }

        .stat-label {
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.82;
        }

        .wave {
            display: block;
            width: 100%;
            margin-top: -2px;
            color: var(--off-white);
        }

        main {
            max-width: 1500px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .bracket-shell {
            background: var(--white);
            border-radius: 22px;
            box-shadow: var(--shadow);
            padding: 1.75rem;
            overflow-x: auto;
        }

        .round-label,
        .champion-title {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.05em;
            font-weight: 400;
        }

        .bracket {
            min-width: 1280px;
            display: flex;
            gap: 1rem;
            align-items: stretch;
        }

        .side {
            flex: 2;
            display: flex;
            gap: 1rem;
            align-items: stretch;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .round-column {
            position: relative;
        }

        .round-label {
            font-size: 0.95rem;
            color: var(--blue);
            margin-bottom: 0.65rem;
            padding-left: 0.25rem;
        }

        .matches {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .match {
            background: linear-gradient(135deg, rgba(0, 61, 165, 0.06), rgba(200, 16, 46, 0.04));
            border: 1px solid var(--grey);
            border-radius: 16px;
            padding: 0.65rem;
            position: relative;
        }

        .match-meta {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: color-mix(in srgb, var(--text) 68%, transparent);
            padding: 0.2rem 0.35rem 0.55rem;
        }

        .match-scoreline {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: color-mix(in srgb, var(--text) 68%, transparent);
            padding: 0.55rem 0.35rem 0.2rem;
        }

        .match::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -1rem;
            width: 1rem;
            height: 2px;
            background: var(--line);
            transform: translateY(-50%);
        }

        .right-side .match::after {
            right: auto;
            left: -1rem;
        }

        .match.final-connector::after,
        .match.no-connector::after {
            display: none;
        }

        .team {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 0.6rem;
            align-items: center;
            background: var(--white);
            border-radius: 12px;
            padding: 0.7rem 0.8rem;
        }

        .team + .team {
            margin-top: 0.45rem;
        }

        .seed {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--off-white);
            border: 1px solid var(--grey);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--blue);
        }

        .team-name {
            font-size: 0.8rem;
            font-weight: 700;
            line-height: 1.2;
            min-height: 1.15em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .seed-empty {
            opacity: 0.35;
            border-style: dashed;
        }

        .team-score-inline {
            margin-left: 0.35rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            color: var(--red);
        }

        .winner {
            border: 2px solid rgba(200, 16, 46, 0.16);
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.07), rgba(0, 61, 165, 0.03));
        }

        .winner .seed {
            background: var(--red);
            color: var(--white);
            border-color: var(--red);
        }

        .winner .team-name {
            color: var(--red-dark);
        }

        .center-column {
            width: 280px;
            flex-shrink: 0;
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            align-items: center;
            gap: 1.25rem;
            padding: 0 0.5rem;
        }

        .final-card,
        .champion-card {
            width: 100%;
            border-radius: 22px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .final-card {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue));
            color: var(--white);
            padding: 1rem;
            position: relative;
            grid-row: 2;
            align-self: center;
        }

        .final-card::before,
        .final-card::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 1.4rem;
            height: 2px;
            background: var(--line);
            transform: translateY(-50%);
        }

        .final-card::before { left: -1.4rem; }
        .final-card::after { right: -1.4rem; }

        .final-label {
            font-size: 1.15rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 0.65rem;
        }

        .final-card .team {
            background: rgba(255, 255, 255, 0.14);
            color: var(--white);
        }

        .final-card .team-name,
        .final-card .winner .team-name,
        .final-card .team-score-inline {
            color: var(--white);
        }

        .final-card .seed {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            color: var(--white);
        }

        .final-card .winner {
            border-color: rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.18);
        }

        .final-card .winner .seed {
            background: var(--white);
            color: var(--blue-dark);
            border-color: var(--white);
        }

        .final-card .match-meta,
        .final-card .match-scoreline {
            color: rgba(255, 255, 255, 0.84);
        }

        .champion-card {
            background: linear-gradient(145deg, #fff2c9, #ffd86b);
            color: #5C3900;
            padding: 1.3rem 1rem;
            border: 2px solid rgba(92, 57, 0, 0.08);
            grid-row: 1;
            align-self: end;
            justify-self: center;
            max-width: 210px;
            width: 100%;
        }

        [data-theme="dark"] .champion-card {
            background: linear-gradient(145deg, #5d4513, #8c6a1f);
            color: #fff0c2;
            border-color: rgba(255, 212, 102, 0.2);
        }

        .champion-title {
            font-size: 1.45rem;
            color: inherit;
            margin-bottom: 0.35rem;
        }

        .champion-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            line-height: 1;
            letter-spacing: 0.04em;
        }

        .champion-meta {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.78rem;
            color: #999;
            letter-spacing: 0.05em;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1100px) {
            .bracket-shell {
                padding: 1rem;
            }
        }

        @media (max-width: 720px) {
            header {
                padding: 4rem 1rem 2.4rem;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .stats-bar {
                gap: 1rem;
            }

            main {
                padding: 1.25rem 0.75rem 3rem;
            }
        }

        /* ==================== Mobile bracket (<= 1024px) ==================== */
        .mobile-bracket { display: none; }

        .mobile-bracket .m-champ {
            background: linear-gradient(145deg, #fff2c9, #ffd86b);
            color: #5C3900;
            border-radius: 18px;
            padding: 1rem 1rem 0.95rem;
            text-align: center;
            box-shadow: var(--shadow);
            border: 2px solid rgba(92, 57, 0, 0.08);
            margin-bottom: 1rem;
        }

        [data-theme="dark"] .mobile-bracket .m-champ {
            background: linear-gradient(145deg, #5d4513, #8c6a1f);
            color: #fff0c2;
            border-color: rgba(255, 212, 102, 0.2);
        }

        .mobile-bracket .m-champ-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }

        .mobile-bracket .m-champ-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            line-height: 1;
            margin-top: 0.2rem;
            letter-spacing: 0.04em;
        }

        .mobile-bracket .m-champ-name.empty {
            opacity: 0.5;
            font-size: 1.1rem;
            letter-spacing: 0.22em;
        }

        .mobile-bracket .m-champ-meta {
            margin-top: 0.4rem;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .mobile-bracket .m-tabs {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--off-white);
            padding: 0.7rem 0 0.55rem;
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--grey);
        }

        .mobile-bracket .m-tabs::-webkit-scrollbar { display: none; }

        .mobile-bracket .m-tab {
            flex: 1 0 auto;
            background: var(--white);
            color: var(--text);
            border: 1px solid var(--grey);
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.1rem;
            min-width: 86px;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .mobile-bracket .m-tab-sub {
            font-size: 0.62rem;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .mobile-bracket .m-tab.active {
            background: var(--blue-dark);
            color: var(--white);
            border-color: var(--blue-dark);
        }

        .mobile-bracket .m-tab.active .m-tab-sub { opacity: 0.85; }

        .mobile-bracket .m-pane { display: none; }
        .mobile-bracket .m-pane.active { display: block; }

        .mobile-bracket .m-round-title {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--blue);
            font-size: 1.35rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 0.15rem;
        }

        .mobile-bracket .m-round-title small {
            font-family: 'Nunito', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.55;
        }

        .mobile-bracket .m-empty-hint {
            background: repeating-linear-gradient(135deg, transparent 0 10px, rgba(0, 61, 165, 0.04) 10px 20px);
            border: 1px dashed var(--line);
            border-radius: 12px;
            padding: 0.9rem;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 700;
            color: color-mix(in srgb, var(--text) 55%, transparent);
            letter-spacing: 0.03em;
            margin-bottom: 0.75rem;
        }

        .mobile-bracket .m-card {
            background: var(--white);
            border: 1px solid var(--grey);
            border-radius: 14px;
            padding: 0.55rem;
            margin-bottom: 0.65rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .mobile-bracket .m-card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: color-mix(in srgb, var(--text) 55%, transparent);
            padding: 0.1rem 0.35rem 0.4rem;
        }

        .mobile-bracket .m-team {
            display: grid;
            grid-template-columns: 28px 1fr auto;
            gap: 0.6rem;
            align-items: center;
            background: var(--off-white);
            border-radius: 10px;
            padding: 0.55rem 0.7rem;
        }

        .mobile-bracket .m-team + .m-team { margin-top: 0.3rem; }

        .mobile-bracket .m-seed {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--white);
            border: 1px solid var(--grey);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--blue);
        }

        .mobile-bracket .m-seed.empty { opacity: 0.35; border-style: dashed; }

        .mobile-bracket .m-name {
            font-weight: 700;
            font-size: 0.95rem;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mobile-bracket .m-name.empty { opacity: 0.5; font-weight: 600; }

        .mobile-bracket .m-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            color: var(--red);
            min-width: 1.5rem;
            text-align: right;
        }

        .mobile-bracket .m-team.winner {
            background: linear-gradient(135deg, rgba(200, 16, 46, 0.08), rgba(0, 61, 165, 0.03));
            border: 1.5px solid rgba(200, 16, 46, 0.22);
        }

        .mobile-bracket .m-team.winner .m-seed {
            background: var(--red);
            color: var(--white);
            border-color: var(--red);
        }

        .mobile-bracket .m-team.winner .m-name { color: var(--red-dark); }

        .mobile-bracket .m-scoreline {
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: color-mix(in srgb, var(--text) 65%, transparent);
            padding: 0.55rem 0.4rem 0.15rem;
        }

        .mobile-bracket .m-final {
            background: linear-gradient(135deg, var(--blue-dark), var(--blue));
            color: var(--white);
            border-radius: 18px;
            padding: 1.1rem 1rem;
            box-shadow: var(--shadow);
        }

        .mobile-bracket .m-final-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 0.7rem;
            opacity: 0.92;
        }

        .mobile-bracket .m-final .m-team { background: rgba(255, 255, 255, 0.14); }

        .mobile-bracket .m-final .m-seed {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--white);
        }

        .mobile-bracket .m-final .m-name { color: var(--white); }

        .mobile-bracket .m-final .m-team.winner {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .mobile-bracket .m-final .m-team.winner .m-seed {
            background: var(--white);
            color: var(--blue-dark);
            border-color: var(--white);
        }

        .mobile-bracket .m-final .m-team.winner .m-name { color: var(--white); }

        .mobile-bracket .m-final .m-scoreline,
        .mobile-bracket .m-final .m-card-head {
            color: rgba(255, 255, 255, 0.85);
        }

        @media (max-width: 1024px) {
            .bracket-shell { display: none; }
            .mobile-bracket { display: block; }
        }
    </style>
</head>
<body>
<header>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle dark mode">&#9789;</button>
    <div class="header-inner">
        <img src="modesto_logo.png" alt="Modesto logo" class="logo" onerror="this.style.display='none'">
        <h1>Masters - Zimska Liga</h1>
        <span class="season-badge">Sezona 2025/2026</span>
        <div class="league-switch"><label for="leagueSwitcher">Natjecanje</label><select id="leagueSwitcher" onchange="switchLeague(this)"><option value="tournament.html" selected>Masters</option><option value="zimska_liga_modesto/index.html">Zimska Liga Modesto</option><option value="zenska_liga_zima/index.html">Ženska Liga Zima</option></select></div>
    </div>
</header>

<svg class="wave" viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path fill="currentColor" d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z"></path>
</svg>

<main>
    <section class="bracket-shell">
        <div class="bracket" id="bracketRoot"></div>
    </section>
    <section class="mobile-bracket" id="mobileBracketRoot"></section>
</main>

<footer>Modesto Padel Club &middot; Masters Tournament Bracket</footer>

<script>
    const SHEET_ID = '1teu2BU7oFytEwIXJ00UULUNCUrGbkPv8g7cQ1sq7pZw';
    const L_QF_CONNECTORS = [null, 'final-connector'];
    const R_QF_CONNECTORS = ['final-connector', null];
    const SF_CONNECTORS = ['no-connector'];

    let BRACKET_DATA = null;

    function gvizUrl(headers) {
        const params = new URLSearchParams({
            tqx: 'out:json',
            headers: String(headers),
        });
        return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?' + params.toString();
    }

    async function fetchSheet(headers) {
        const res = await fetch(gvizUrl(headers));
        if (!res.ok) throw new Error('Fetch failed: ' + res.status);
        const text = await res.text();
        const start = text.indexOf('{');
        const end = text.lastIndexOf('}');
        if (start < 0 || end < 0) throw new Error('Unexpected gviz payload');
        const json = JSON.parse(text.substring(start, end + 1));
        if (json.status === 'error') {
            const msg = (json.errors || []).map(e => e.detailed_message || e.message).join('; ');
            throw new Error('gviz error: ' + (msg || 'unknown'));
        }
        return json.table;
    }

    function rowsAsObjects(table) {
        const labels = (table.cols || []).map(c => String(c.label || '').trim());
        return (table.rows || []).map(r => {
            const obj = {};
            (r.c || []).forEach((gcell, i) => {
                obj[labels[i]] = gcell;
            });
            return obj;
        });
    }

    function cellText(gcell, def) {
        if (!gcell) return def;
        const v = gcell.f != null ? gcell.f : gcell.v;
        if (v === null || v === undefined) return def;
        const s = String(v).trim();
        if (!s || s.toUpperCase() === 'TBD') return def;
        return s;
    }

    function cellField(row, key, def) {
        return cellText(row ? row[key] : null, def != null ? def : '');
    }

    function cellBool(row, key) {
        const gcell = row ? row[key] : null;
        if (!gcell) return false;
        const v = gcell.v;
        if (typeof v === 'boolean') return v;
        if (typeof v === 'number') return !!v;
        if (typeof v === 'string') return ['1', 'true', 'yes'].includes(v.trim().toLowerCase());
        return false;
    }

    function toMatch(row, connector) {
        const m = {
            date: cellField(row, 'date'),
            scoreline: cellField(row, 'scoreline'),
            teams: [
                { seed: cellField(row, 'team1_seed'), name: cellField(row, 'team1_name'), score: cellField(row, 'team1_score'), winner: cellBool(row, 'team1_winner') },
                { seed: cellField(row, 'team2_seed'), name: cellField(row, 'team2_name'), score: cellField(row, 'team2_score'), winner: cellBool(row, 'team2_winner') },
            ],
        };
        if (connector) m.connector = connector;
        return m;
    }

    function matchesFor(rows, roundCode, connectors) {
        const filtered = rows
            .filter(r => r['round'] && r['round'].v === roundCode)
            .sort((a, b) => {
                const pa = a['position'] && a['position'].v;
                const pb = b['position'] && b['position'].v;
                return (pa == null ? 0 : pa) - (pb == null ? 0 : pb);
            });
        return filtered.map((row, i) => toMatch(row, (connectors && connectors[i]) || null));
    }

    function championCell(champTable, rowIdx) {
        const r = (champTable.rows || [])[rowIdx];
        if (!r || !r.c) return '';
        return cellText(r.c[1], '');
    }

    function finalWinnerName(finalRow) {
        if (!finalRow) return '';
        if (cellBool(finalRow, 'team1_winner')) return cellField(finalRow, 'team1_name');
        if (cellBool(finalRow, 'team2_winner')) return cellField(finalRow, 'team2_name');
        return '';
    }

    function buildBracket(matchesTable, champTable) {
        const rows = rowsAsObjects(matchesTable);
        const finalRow = rows.find(r => r['round'] && r['round'].v === 'FINAL') || null;
        const autoChampName = finalWinnerName(finalRow);

        return {
            left: {
                rounds: [
                    { label: 'Osmina finala', matches: matchesFor(rows, 'L_R16') },
                    { label: 'Četvrtfinale', stacked: true, matches: matchesFor(rows, 'L_QF', L_QF_CONNECTORS) },
                ],
                semifinal: { label: 'Polufinale', matches: matchesFor(rows, 'L_SF', SF_CONNECTORS) },
            },
            center: {
                champion: {
                    title: 'Pobjednik',
                    name: autoChampName || championCell(champTable, 30),
                    meta: championCell(champTable, 31),
                },
                final: {
                    label: 'Finale',
                    date: cellField(finalRow, 'date'),
                    scoreline: cellField(finalRow, 'scoreline'),
                    teams: [
                        { seed: cellField(finalRow, 'team1_seed'), name: cellField(finalRow, 'team1_name'), score: cellField(finalRow, 'team1_score'), winner: cellBool(finalRow, 'team1_winner') },
                        { seed: cellField(finalRow, 'team2_seed'), name: cellField(finalRow, 'team2_name'), score: cellField(finalRow, 'team2_score'), winner: cellBool(finalRow, 'team2_winner') },
                    ],
                },
            },
            right: {
                semifinal: { label: 'Polufinale', matches: matchesFor(rows, 'R_SF', SF_CONNECTORS) },
                rounds: [
                    { label: 'Četvrtfinale', stacked: true, matches: matchesFor(rows, 'R_QF', R_QF_CONNECTORS) },
                    { label: 'Osmina finala', matches: matchesFor(rows, 'R_R16') },
                ],
            },
        };
    }


    function switchLeague(selectEl) {
        if (!selectEl || !selectEl.value) return;
        window.location.href = selectEl.value;
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('themeBtn').textContent = next === 'dark' ? '\u2600' : '\u263D';
    }

    function renderBracket() {
        const root = document.getElementById('bracketRoot');
        root.innerHTML = [
            renderSide(BRACKET_DATA.left, 'left-side'),
            renderRoundColumn(BRACKET_DATA.left.semifinal),
            renderCenterColumn(BRACKET_DATA.center),
            renderRoundColumn(BRACKET_DATA.right.semifinal),
            renderSide(BRACKET_DATA.right, 'right-side')
        ].join('');
    }

    function renderSide(sideData, sideClass) {
        return '<div class="side ' + sideClass + '">' +
            sideData.rounds.map(renderRoundColumn).join('') +
            '</div>';
    }

    function renderRoundColumn(round) {
        return '<div class="column round-column">' +
            '<div class="round-label">' + escapeHtml(round.label) + '</div>' +
            '<div class="matches">' +
            round.matches.map(renderMatch).join('') +
            '</div>' +
            '</div>';
    }

    function hasText(v) {
        return v !== undefined && v !== null && String(v).trim() !== '';
    }

    function renderCenterColumn(center) {
        const champName = hasText(center.champion.name) ? escapeHtml(center.champion.name) : '&nbsp;';
        const champMeta = hasText(center.champion.meta)
            ? '<div class="champion-meta">' + escapeHtml(center.champion.meta) + '</div>'
            : '';
        return '<div class="center-column">' +
            '<article class="champion-card">' +
            '<div class="champion-title">' + escapeHtml(center.champion.title) + '</div>' +
            '<div class="champion-name">' + champName + '</div>' +
            champMeta +
            '</article>' +
            '<article class="final-card">' +
            '<div class="final-label">' + escapeHtml(center.final.label) + '</div>' +
            renderMatchBody(center.final) +
            '</article>' +
            '</div>';
    }

    function renderMatch(match) {
        const connectorClass = match.connector ? ' ' + match.connector : '';
        return '<article class="match' + connectorClass + '">' +
            renderMatchBody(match) +
            '</article>';
    }

    function renderMatchBody(match) {
        const meta = hasText(match.date)
            ? '<div class="match-meta">' + escapeHtml(match.date) + '</div>'
            : '';
        const scoreline = hasText(match.scoreline)
            ? '<div class="match-scoreline">' + escapeHtml(match.scoreline) + '</div>'
            : '';
        return meta + match.teams.map(renderTeam).join('') + scoreline;
    }

    function renderTeam(team) {
        const seed = hasText(team.seed)
            ? '<span class="seed">' + escapeHtml(String(team.seed)) + '</span>'
            : '<span class="seed seed-empty"></span>';
        const name = hasText(team.name) ? escapeHtml(team.name) : '&nbsp;';
        const score = hasText(team.score)
            ? '<span class="team-score-inline">' + escapeHtml(String(team.score)) + '</span>'
            : '<span class="team-score-inline"></span>';
        return '<div class="team' + (team.winner ? ' winner' : '') + '">' +
            seed +
            '<span class="team-name">' + name + '</span>' +
            score +
            '</div>';
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Parses "Petak 24.4.2026. 19:00" → timestamp for sorting; returns Infinity for TBD
    function parseMatchDate(str) {
        if (!str || !str.trim()) return Infinity;
        var parts = str.trim().split(/\s+/);
        if (parts.length < 2) return Infinity;
        var dp = parts[1].replace(/\.$/, '').split('.');
        var tp = (parts[2] || '0:0').split(':');
        if (dp.length < 3) return Infinity;
        var day = parseInt(dp[0], 10), month = parseInt(dp[1], 10) - 1, year = parseInt(dp[2], 10);
        var hour = parseInt(tp[0] || '0', 10), min = parseInt(tp[1] || '0', 10);
        if (isNaN(day) || isNaN(month) || isNaN(year)) return Infinity;
        return new Date(year, month, day, hour, min).getTime();
    }

    function sortByDate(matches) {
        return matches.slice().sort(function (a, b) {
            return parseMatchDate(a.date) - parseMatchDate(b.date);
        });
    }

    function renderMobileBracket() {
        const root = document.getElementById('mobileBracketRoot');
        if (!root) return;

        const r16 = sortByDate(BRACKET_DATA.left.rounds[0].matches.concat(BRACKET_DATA.right.rounds[1].matches));
        const qf  = sortByDate(BRACKET_DATA.left.rounds[1].matches.concat(BRACKET_DATA.right.rounds[0].matches));
        const sf  = sortByDate(BRACKET_DATA.left.semifinal.matches.concat(BRACKET_DATA.right.semifinal.matches));
        const finalMatch = BRACKET_DATA.center.final;
        const champion = BRACKET_DATA.center.champion;

        const tabs = [
            { id: 'r16',   label: 'Osmina',       sub: '8 parova' },
            { id: 'qf',    label: 'Četvrtfinale', sub: '4 para' },
            { id: 'sf',    label: 'Polufinale',   sub: '2 para' },
            { id: 'final', label: 'Finale',       sub: '1 par' }
        ];

        root.innerHTML =
            renderMobileChamp(champion) +
            '<nav class="m-tabs" role="tablist">' +
                tabs.map(function (t, i) {
                    return '<button class="m-tab' + (i === 0 ? ' active' : '') + '" data-target="' + t.id + '" role="tab" type="button">' +
                        escapeHtml(t.label) +
                        '<span class="m-tab-sub">' + escapeHtml(t.sub) + '</span>' +
                        '</button>';
                }).join('') +
            '</nav>' +
            renderMobileRoundPane('r16', 'Osmina finala', r16, '8 parova', true) +
            renderMobileRoundPane('qf',  'Četvrtfinale',  qf,  '4 para',  false) +
            renderMobileRoundPane('sf',  'Polufinale',    sf,  '2 para',  false) +
            renderMobileFinalPane(finalMatch);

        root.querySelectorAll('.m-tab').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const target = btn.getAttribute('data-target');
                root.querySelectorAll('.m-tab').forEach(function (b) {
                    b.classList.toggle('active', b === btn);
                });
                root.querySelectorAll('.m-pane').forEach(function (p) {
                    p.classList.toggle('active', p.getAttribute('data-pane') === target);
                });
            });
        });
    }

    function renderMobileChamp(champion) {
        const title = hasText(champion.title) ? escapeHtml(champion.title) : 'Pobjednici';
        const nameHtml = hasText(champion.name)
            ? '<div class="m-champ-name">' + escapeHtml(champion.name) + '</div>'
            : '<div class="m-champ-name empty">TBD</div>';
        const metaHtml = hasText(champion.meta)
            ? '<div class="m-champ-meta">' + escapeHtml(champion.meta) + '</div>'
            : '';
        return '<div class="m-champ">' +
                '<div class="m-champ-title">' + title + '</div>' +
                nameHtml +
                metaHtml +
            '</div>';
    }

    function renderMobileRoundPane(id, title, matches, count, active) {
        const allEmpty = matches.length > 0 && matches.every(function (m) {
            return m.teams.every(function (t) { return !hasText(t.name); });
        });
        const hint = allEmpty
            ? '<div class="m-empty-hint">Parovi se određuju nakon prethodnog kola.</div>'
            : '';
        return '<section class="m-pane' + (active ? ' active' : '') + '" data-pane="' + id + '" role="tabpanel">' +
                '<div class="m-round-title">' + escapeHtml(title) + '<small>' + escapeHtml(count) + '</small></div>' +
                hint +
                matches.map(function (m, i) { return renderMobileMatch(m, i + 1); }).join('') +
            '</section>';
    }

    function renderMobileFinalPane(match) {
        return '<section class="m-pane" data-pane="final" role="tabpanel">' +
                '<div class="m-round-title">Finale<small>1 par</small></div>' +
                '<div class="m-final">' +
                    '<div class="m-final-label">Finale</div>' +
                    renderMobileMatchBody(match) +
                '</div>' +
            '</section>';
    }

    function renderMobileMatch(match, index) {
        const meta = hasText(match.date)
            ? '<span>' + escapeHtml(match.date) + '</span>'
            : '<span>TBD</span>';
        return '<article class="m-card">' +
                '<div class="m-card-head"><span>Meč ' + index + '</span>' + meta + '</div>' +
                renderMobileMatchBody(match) +
            '</article>';
    }

    function renderMobileMatchBody(match) {
        const scoreline = hasText(match.scoreline)
            ? '<div class="m-scoreline">' + escapeHtml(match.scoreline) + '</div>'
            : '';
        return match.teams.map(renderMobileTeam).join('') + scoreline;
    }

    function renderMobileTeam(team) {
        const seed = hasText(team.seed)
            ? '<span class="m-seed">' + escapeHtml(String(team.seed)) + '</span>'
            : '<span class="m-seed empty"></span>';
        const nameHas = hasText(team.name);
        const name = nameHas ? escapeHtml(team.name) : '—';
        const score = hasText(team.score)
            ? '<span class="m-score">' + escapeHtml(String(team.score)) + '</span>'
            : '<span class="m-score"></span>';
        return '<div class="m-team' + (team.winner ? ' winner' : '') + '">' +
                seed +
                '<span class="m-name' + (nameHas ? '' : ' empty') + '">' + name + '</span>' +
                score +
            '</div>';
    }

    document.addEventListener('DOMContentLoaded', function () {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').textContent = theme === 'dark' ? '\u2600' : '\u263D';
        loadAndRender();
    });

    function renderStatus(message, isError) {
        const color = isError ? 'var(--red)' : 'var(--text)';
        const html = '<div style="padding:2rem;text-align:center;color:' + color + ';width:100%;">' + escapeHtml(message) + '</div>';
        const desktop = document.getElementById('bracketRoot');
        const mobile = document.getElementById('mobileBracketRoot');
        if (desktop) desktop.innerHTML = html;
        if (mobile) mobile.innerHTML = html;
    }

    async function loadAndRender() {
        renderStatus('Loading bracket...', false);
        try {
            const [matchesTable, champTable] = await Promise.all([
                fetchSheet('Matches', 1),
                fetchSheet('Champion', 0),
            ]);
            BRACKET_DATA = buildBracket(matchesTable, champTable);
            renderBracket();
            renderMobileBracket();
        } catch (err) {
            renderStatus('Failed to load bracket: ' + (err && err.message ? err.message : err), true);
        }
    }
</script>
</body>
</html>
